name: Deploy to Cloud Run

# Runs after CI passes on main, so only green code deploys. Also runnable
# manually from the Actions tab (workflow_dispatch).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # allows Workload Identity Federation if you use it

jobs:
  deploy:
    # Deploy on a successful CI run on main, or when triggered by hand.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # Skip cleanly (green) when auto-deploy isn't configured yet, so a missing
      # secret never shows up as a failed check. Set GCP_SA_KEY + GCP_PROJECT_ID
      # to enable (see docs/DEPLOY.md).
      - name: Check auto-deploy is configured
        id: gate
        run: echo "ready=${{ secrets.GCP_SA_KEY != '' && secrets.GCP_PROJECT_ID != '' }}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        if: steps.gate.outputs.ready == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        if: steps.gate.outputs.ready == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy backend (ai-workforce, europe-west1)
        if: steps.gate.outputs.ready == 'true'
        run: gcloud builds submit --config cloudbuild.backend.yaml --substitutions=_TAG="${GITHUB_SHA::7}" .

      - name: Deploy frontend (bruno-ai-workforce-front, northamerica-northeast1)
        if: steps.gate.outputs.ready == 'true'
        run: gcloud builds submit --config cloudbuild.frontend.yaml --substitutions=_TAG="${GITHUB_SHA::7}" .

      - name: Note when skipped
        if: steps.gate.outputs.ready != 'true'
        run: echo "Auto-deploy not configured (GCP_SA_KEY / GCP_PROJECT_ID unset) — skipping. Deploy manually with ./deploy.sh."
