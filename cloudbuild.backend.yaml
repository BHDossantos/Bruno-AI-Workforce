# Builds the FastAPI backend image AND deploys it to its Cloud Run service.
#   gcloud builds submit --config cloudbuild.backend.yaml .
# _TAG defaults to "latest" so manual `gcloud builds submit` works (COMMIT_SHA is
# only populated by Cloud Build triggers); pass --substitutions=_TAG=<sha> to tag.
substitutions:
  _SERVICE: ai-workforce
  _REGION: europe-west1
  _TAG: latest
images:
  - gcr.io/$PROJECT_ID/$_SERVICE:$_TAG
steps:
  - name: gcr.io/cloud-builders/docker
    args: [build, -f, Dockerfile, -t, "gcr.io/$PROJECT_ID/$_SERVICE:$_TAG", .]
  - name: gcr.io/cloud-builders/docker
    args: [push, "gcr.io/$PROJECT_ID/$_SERVICE:$_TAG"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=gcr.io/$PROJECT_ID/$_SERVICE:$_TAG
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      # 24/7 engine: keep one instance always warm and give it CPU even between
      # requests, so the in-process APScheduler (lead sourcing, auto-outreach,
      # follow-ups, reply sync) actually runs around the clock instead of being
      # frozen/reaped when the service is idle. Without these, outreach is drafted
      # but never sent, and cold starts surface as "Failed to fetch" in the UI.
      - --min-instances=1
      - --no-cpu-throttling
      - --cpu=1
      - --memory=1Gi
      # Extra CPU during container startup so the heavy imports (langgraph,
      # playwright, google libs) finish before Cloud Run's health check window —
      # without this the new revision intermittently fails to become ready and the
      # whole deploy errors on the "gcloud run deploy" step (a recurring flake).
      - --cpu-boost
      # Long actions (Work the pipeline) can exceed the 5-min default.
      - --timeout=600
      # Ensure the scheduler is on in prod (config default, set explicitly here so
      # it can't be silently off), and stamp the deploying commit so /version can
      # report which build is actually live. Other env vars/secrets are untouched.
      - --update-env-vars=ENABLE_SCHEDULER=true,BUILD_SHA=${_TAG}
options:
  logging: CLOUD_LOGGING_ONLY
